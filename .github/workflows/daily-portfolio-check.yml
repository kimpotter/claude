name: Daily Portfolio Check

on:
  workflow_dispatch:

jobs:
  daily-check:
    name: Fetch positions & write to Airtable
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v2
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: v2/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run daily portfolio check
        env:
          BLOFIN_API_KEY: ${{ secrets.BLOFIN_API_KEY }}
          BLOFIN_SECRET: ${{ secrets.BLOFIN_SECRET }}
          BLOFIN_PASSPHRASE: ${{ secrets.BLOFIN_PASSPHRASE }}
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
          ARB_RPC_URL: ${{ secrets.ARB_RPC_URL }}
          DRY_RUN: ${{ vars.DRY_RUN }}
        run: node index.js

  generate-brief:
    name: Generate & deliver morning brief
    runs-on: ubuntu-latest
    needs: daily-check
    defaults:
      run:
        working-directory: v2
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: v2/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Generate brief text via Claude API
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
        run: node brief/generate-brief.mjs

      - name: Convert brief to audio via ElevenLabs
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
        run: node brief/morning-brief-audio.mjs

      - name: Update RSS feed & commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node brief/update-rss.mjs
